name: TrackIt
description: A Flutter budget tracking application
publish_to: "none"
version: 1.0.4+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.2.1
  shared_preferences: ^2.3.4
  cupertino_icons: ^1.0.2
  dio: ^5.7.0
  animated_custom_dropdown: ^3.1.1
  flutter_custom_clippers: ^2.1.0
  flutter_native_splash: ^2.2.13
  flutter_dotenv: ^5.1.0
  flutter_gemini: ^3.0.0
  flutter_screenutil: ^5.6.0
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.0.1
  flutter_spinkit: ^5.1.0
  flutter_svg: ^2.0.9
  iconsax_plus: ^1.0.0
  smart_snackbars: ^1.0.0
  get: ^4.6.5
  get_storage: ^2.0.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.7.0
  logging: ^1.1.0
  overlay_support: ^2.0.1
  package_info_plus: ^8.0.2
  path_provider: ^2.0.11
  pin_code_fields: ^8.0.1
  http: ^1.3.0
  grain: ^0.0.1
  jwt_decoder:
  # firebase_storage: ^12.3.0
  image_picker: ^1.1.2
  qr_flutter: ^4.0.0
  go_router: ^14.1.4
  google_fonts: ^6.2.1
  dotted_border: ^2.0.0+3
  file_picker: ^9.0.1
  form_builder_validators:
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  supabase_flutter: ^2.0.0
  carousel_slider: ^5.0.0
  google_nav_bar: ^5.0.6
  line_icons: ^2.0.3
  pull_to_refresh: ^2.0.0
  share_plus: ^10.0.2
  liquid_pull_to_refresh: ^3.0.1
  pinput: ^5.0.0
  flutter_contacts: ^1.1.7+1
  grouped_list: ^6.0.0
  flutter_advanced_switch: ^3.0.1
  home_widget: ^0.7.0+1
  # lite_rolling_switch:
  # pdf: ^3.10.7
  url_launcher: ^6.1.10
  url_launcher_web: ^2.3.3
  another_flutter_splash_screen: ^1.2.0
  tuple: ^2.0.2
  avatar_glow: ^3.0.1
  change_app_package_name: ^1.1.0
  # onesignal_flutter: ^5.1.2
  image_network: ^2.5.4+1
  flutter_riverpod: ^2.3.6
  fl_chart: ^0.70.2
  syncfusion_flutter_charts: ^27.1.51
  animated_text_kit: ^4.2.2
  shadcn_flutter: ^0.0.34
  # family_bottom_sheet: ^0.0.1

dev_dependencies:
  build_runner: null
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  json_serializable: null
  very_good_analysis: ^7.0.0
  flutter_lints: ^5.0.0

dependency_overrides:
  app_links: ^6.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/animations/
    - assets/png/
    - assets/svg/
    - assets/rive_assets/
    - .env

  fonts:
    - family: Gilroy
      fonts:
        - asset: fonts/Gilroy-Regular.ttf
    - family: GilroyBold
      fonts:
        - asset: fonts/Gilroy-Bold.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
    - family: InterBold
      fonts:
        - asset: fonts/Inter-Bold.ttf
    - family: GeistSans
      fonts:
        - asset: packages/shadcn_flutter/fonts/Geist-Black.otf
          weight: 800
        - asset: packages/shadcn_flutter/fonts/Geist-Bold.otf
          weight: 700
        - asset: packages/shadcn_flutter/fonts/Geist-Light.otf
          weight: 300
        - asset: packages/shadcn_flutter/fonts/Geist-Medium.otf
          weight: 500
        - asset: packages/shadcn_flutter/fonts/Geist-SemiBold.otf
          weight: 600
        - asset: packages/shadcn_flutter/fonts/Geist-Thin.otf
          weight: 100
        - asset: packages/shadcn_flutter/fonts/Geist-UltraBlack.otf
          weight: 900
        - asset: packages/shadcn_flutter/fonts/Geist-UltraLight.otf
          weight: 200
        - asset: packages/shadcn_flutter/fonts/Geist-Regular.otf
          weight: 400
    - family: GeistMono
      fonts:
        - asset: packages/shadcn_flutter/fonts/GeistMono-Black.otf
          weight: 800
        - asset: packages/shadcn_flutter/fonts/GeistMono-Bold.otf
          weight: 700
        - asset: packages/shadcn_flutter/fonts/GeistMono-Light.otf
          weight: 300
        - asset: packages/shadcn_flutter/fonts/GeistMono-Medium.otf
          weight: 500
        - asset: packages/shadcn_flutter/fonts/GeistMono-Regular.otf
          weight: 400
        - asset: packages/shadcn_flutter/fonts/GeistMono-SemiBold.otf
          weight: 600
        - asset: packages/shadcn_flutter/fonts/GeistMono-Thin.otf
          weight: 100
        - asset: packages/shadcn_flutter/fonts/GeistMono-UltraBlack.otf
          weight: 900
        - asset: packages/shadcn_flutter/fonts/GeistMono-UltraLight.otf
          weight: 200
    - family: RadixIcons
      fonts:
        - asset: packages/shadcn_flutter/icons/RadixIcons.otf
    - family: BootstrapIcons
      fonts:
        - asset: packages/shadcn_flutter/icons/BootstrapIcons.otf
  #

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/png/trackItLogo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/png/trackItLogo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/png/trackItLogo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/png/trackItLogo.png"
